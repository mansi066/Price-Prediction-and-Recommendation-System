<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Recommendation System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 40px;
        }
        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }
        .section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 25px;
            border: 1px solid #e9ecef;
        }
        .section h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #495057;
        }
        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #3498db;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }
        button:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
        }
        .results {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        .result-item {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            transition: transform 0.2s ease;
        }
        .result-item:hover {
            transform: translateX(5px);
            border-color: #3498db;
        }
        .property-name {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .distance {
            color: #27ae60;
            font-weight: 500;
        }
        .similarity {
            color: #e74c3c;
            font-weight: 500;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #6c757d;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid #f5c6cb;
        }
        .success {
            background: #d1ecf1;
            color: #0c5460;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid #bee5eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 Property Recommendation System</h1>
            <p>Find properties by location and get intelligent recommendations</p>
        </div>
        
        <div class="content">
            <!-- Location Search Section -->
            <div class="section">
                <h2>📍 Search by Location & Radius</h2>
                <div class="form-group">
                    <label for="location">Select Location:</label>
                    <select id="location">
                        <option value="">Loading locations...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="radius">Radius (in Kilometers):</label>
                    <input type="number" id="radius" min="0.1" max="50" step="0.1" value="5" placeholder="Enter radius in km">
                </div>
                <button id="search-btn" onclick="searchLocation()">🔍 Search Properties</button>
                <div id="location-results" class="results"></div>
            </div>

            <!-- Recommendation Section -->
            <div class="section">
                <h2>🤖 Get Property Recommendations</h2>
                <div class="form-group">
                    <label for="property">Select Property:</label>
                    <select id="property">
                        <option value="">Loading properties...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="top-n">Number of Recommendations:</label>
                    <input type="number" id="top-n" min="1" max="20" value="5" placeholder="Number of recommendations">
                </div>
                <button id="recommend-btn" onclick="getRecommendations()">🚀 Get Recommendations</button>
                <div id="recommendation-results" class="results"></div>
            </div>
        </div>
    </div>

    <script src="recommendation.js"></script>
</body>
</html>
